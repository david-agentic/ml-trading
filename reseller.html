<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0d1b2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ML Reseller">
  <meta name="mobile-web-app-capable" content="yes">
  <title>ML Trading Reseller Portal</title>
  <link rel="manifest" href="/manifest-reseller.json">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
  <link rel="apple-touch-icon" href="/icon-512.png">
  <style>
    html,body { margin:0; padding:0; width:100%; height:100vh; overflow:hidden;
                background:#0d1b2a; font-family:-apple-system,BlinkMacSystemFont,'Inter',Arial,sans-serif; }
    body { height:100dvh; }
    #splash { position:fixed; inset:0; z-index:100; background:#0d1b2a;
              display:flex; flex-direction:column; align-items:center; justify-content:center;
              color:white; transition:opacity 0.4s; padding:0 24px; }
    #splash.hide { opacity:0; pointer-events:none; }
    #splash img { max-width:min(82vw,400px); width:100%; height:auto; display:block; }
    #splash .role { font-size:13px; opacity:0.9; margin-top:22px; font-weight:600;
                    text-transform:uppercase; letter-spacing:0.18em; }
    #splash .loader { margin-top:30px; width:26px; height:26px;
                      border:2.5px solid rgba(255,255,255,0.2); border-top-color:white;
                      border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    iframe { position:fixed; inset:0; width:100vw; height:100vh; height:100dvh;
             border:none; background:white; }
  </style>
</head>
<body>
  <div id="splash">
    <img src="/logo-wordmark.png" alt="ML Trading International LTD">
    <div class="role">Reseller Portal</div>
    <div class="loader"></div>
  </div>
  <iframe id="appframe"
    src="https://script.google.com/macros/s/AKfycbzKyJzNcbmzq_ajLOyHQh-J49zGtS3rT01_-aXCxMv3vG81yyS6pQ8kRanGkNg9Dp7ufg/exec?v=34"
    allow="clipboard-read; clipboard-write; camera; microphone"></iframe>
  <script>
    const s = document.getElementById('splash');
    const f = document.getElementById('appframe');
    f.addEventListener('load', () => {
      setTimeout(() => s.classList.add('hide'), 500);
      setTimeout(() => s.style.display = 'none', 1000);
    });
    setTimeout(() => { s.classList.add('hide');
      setTimeout(() => s.style.display='none', 500); }, 8000);
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{}));
    }
    document.addEventListener('gesturestart', e => e.preventDefault());
  </script>
</body>
</html>
